[project]
name = "ablation-detector"
version = "0.1.0"
description = "RAG-based semantic ablation detector for skill testing"
requires-python = ">=3.10"
license = "Unlicense"
dependencies = [
    "scikit-learn>=1.3",
    "numpy>=1.24",
    "click>=8.0",
    "rich>=13.0",
    "pyyaml>=6.0",
    "marko>=2.0",
]

[project.optional-dependencies]
neural = ["sentence-transformers>=2.2"]
dev = ["pytest>=7.0"]

[project.scripts]
ablation = "ablation.cli:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"
