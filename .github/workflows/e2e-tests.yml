name: E2E Tests (dev-record)

on:
  workflow_dispatch:
    inputs:
      models:
        description: Model tiers to test (comma-separated)
        type: choice
        options:
          - weakest
          - mid
          - strongest
          - weakest,mid
          - weakest,mid,strongest
        default: weakest

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          models='${{ inputs.models || 'weakest' }}'
          matrix=$(echo "$models" | jq -Rc 'split(",") | map(ltrimstr(" ") | rtrimstr(" ")) | {model: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install test dependencies
        run: pip install ./tests

      - name: Run E2E tests
        run: |
          pytest tests/skills/dev-record/test_full_workflow.py \
            --model ${{ matrix.model }} \
            --basetemp "$GITHUB_WORKSPACE/.pytest-tmp" \
            -v -s

      - name: Upload report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.model }}
          path: |
            tests/reports/*${{ matrix.model }}*.html
            tests/reports/*${{ matrix.model }}*.json
            tests/reports/*${{ matrix.model }}*.summary.md
          if-no-files-found: ignore

      - name: Sanitize sandbox filenames
        if: always()
        run: |
          # upload-artifact rejects colons in paths (Windows compat)
          find .pytest-tmp/ -name '*:*' -exec bash -c 'mv "$1" "${1//:/-}"' _ {} \; 2>/dev/null || true

      - name: Upload sandbox
        id: upload-sandbox
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-${{ matrix.model }}
          path: .pytest-tmp/test_full_workflow0/project/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Job summary
        if: always()
        run: |
          aci="https://www.artifact.ci/artifact/view/${{ github.repository }}/run/${{ github.run_id }}.1"
          md_file=$(ls tests/reports/*${{ matrix.model }}*.summary.md 2>/dev/null | head -1)

          if [ -n "$md_file" ]; then
            cat "$md_file" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## \`${{ matrix.model }}\` — skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No metrics collected (test may have been skipped or failed before reporting)." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Report](${aci}/report-${{ matrix.model }}) · [Sandbox](${aci}/sandbox-${{ matrix.model }})" >> "$GITHUB_STEP_SUMMARY"

  summary:
    needs: [setup, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: reports/

      - name: Cross-model summary
        run: |
          echo "## E2E Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          found=false
          for md_file in $(find reports/ -name '*.summary.md' | sort); do
            found=true
            cat "$md_file" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done

          if [ "$found" = false ]; then
            echo "_No metrics collected from any model._" >> "$GITHUB_STEP_SUMMARY"
          fi
