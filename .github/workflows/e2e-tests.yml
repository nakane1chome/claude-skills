name: E2E Tests (dev-record)

on:
  push:
    branches: [dev-record-plugin]
  workflow_dispatch:
    inputs:
      models:
        description: Model tiers to test (comma-separated)
        type: choice
        options:
          - weakest
          - mid
          - strongest
          - weakest,mid
          - weakest,mid,strongest
        default: weakest

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          models='${{ inputs.models || 'weakest' }}'
          matrix=$(echo "$models" | jq -Rc 'split(",") | map(ltrimstr(" ") | rtrimstr(" ")) | {model: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install test dependencies
        run: pip install ./tests

      - name: Run E2E tests
        run: |
          pytest tests/skills/dev-record/test_full_workflow.py \
            --model ${{ matrix.model }} \
            --basetemp "$GITHUB_WORKSPACE/.pytest-tmp" \
            -v

      - name: Upload HTML report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.model }}
          path: tests/reports/*${{ matrix.model }}*.html
          if-no-files-found: ignore

      - name: Sanitize sandbox filenames
        if: always()
        run: |
          # upload-artifact rejects colons in paths (Windows compat)
          find .pytest-tmp/ -name '*:*' -exec bash -c 'mv "$1" "${1//:/-}"' _ {} \; 2>/dev/null || true

      - name: Upload sandbox
        id: upload-sandbox
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-${{ matrix.model }}
          path: .pytest-tmp/test_full_workflow0/project/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Job summary
        if: always()
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          artifact_ci="https://artifact.ci/gh/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## E2E Test: \`${{ matrix.model }}\`

          | Artifact | |
          |----------|------|
          | HTML Report | [View](${artifact_ci}) |
          | Sandbox | [View](${artifact_ci}) |
          | All artifacts | [Download](${run_url}) |
          EOF
